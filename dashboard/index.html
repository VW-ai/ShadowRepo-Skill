<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShadowRepo Dashboard</title>
<style>
/* ── Reset & Base ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #242836;
  --border: #2e3345;
  --text: #e1e4ed;
  --text-dim: #8b91a5;
  --accent: #6c8aff;
  --accent-dim: #4a5f99;
  --green: #4ade80;
  --yellow: #fbbf24;
  --red: #f87171;
  --orange: #fb923c;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --sidebar-w: 300px;
  --topbar-h: 56px;
  --radius: 8px;
  --font: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
}
html, body { height: 100%; font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

/* ── Layout ── */
.app { display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: var(--topbar-h); min-height: var(--topbar-h); background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 20px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── Topbar ── */
.topbar .logo { font-size: 15px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; margin: 0; }
.topbar .stats { display: flex; gap: 20px; margin-left: auto; }
.stat { display: flex; align-items: center; gap: 6px; }
.stat-value { font-weight: 700; font-size: 14px; }
.stat-label { color: var(--text-dim); font-size: 11px; }
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }
.topbar .build-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.build-badge.complete { background: rgba(74,222,128,0.15); color: var(--green); }
.build-badge.partial { background: rgba(251,191,36,0.15); color: var(--yellow); }

/* ── Tabs ── */
.tab-bar { display: flex; border-bottom: 1px solid var(--border); background: var(--surface); }
.tab { padding: 10px 20px; cursor: pointer; color: var(--text-dim); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; border: none; border-bottom: 2px solid transparent; background: none; font-family: var(--font); transition: color 0.15s, border-color 0.15s, background 0.15s; }
.tab:hover { color: var(--text); background: var(--surface2); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Sidebar ── */
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.sidebar-header h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); margin-bottom: 8px; }
.sidebar-search { width: 100%; padding: 7px 10px; background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 12px; outline: none; }
.sidebar-search:focus { border-color: var(--accent); }
.tree-container { flex: 1; overflow-y: auto; padding: 8px 0; }

/* ── Feature Tree ── */
.tree-node { user-select: none; }
.tree-label { display: flex; align-items: center; gap: 6px; padding: 5px 12px; cursor: pointer; transition: background 0.1s; font-size: 12px; }
.tree-label:hover { background: var(--surface2); }
.tree-label.selected { background: var(--accent-dim); color: #fff; }
.tree-toggle { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-dim); font-size: 10px; flex-shrink: 0; transition: transform 0.15s; }
.tree-toggle.open { transform: rotate(90deg); }
.tree-toggle.leaf { visibility: hidden; }
.tree-icon { font-size: 14px; flex-shrink: 0; }
.tree-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.tree-count { color: var(--text-dim); font-size: 11px; flex-shrink: 0; }
.tree-children { padding-left: 16px; }
.tree-children.collapsed { display: none; }

/* type badges */
.type-badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
.type-business { background: rgba(108,138,255,0.15); color: var(--accent); }
.type-platform { background: rgba(167,139,250,0.15); color: var(--purple); }
.type-cross-cutting { background: rgba(34,211,238,0.15); color: var(--cyan); }

/* ── Spec Cards ── */
.spec-grid { display: flex; flex-direction: column; gap: 8px; }
.spec-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; cursor: pointer; transition: all 0.15s; }
.spec-card:hover { border-color: var(--accent-dim); transform: translateY(-1px); }
.spec-card.expanded { border-color: var(--accent); }
.spec-header { display: flex; align-items: center; gap: 8px; }
.spec-type { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 4px; flex-shrink: 0; }
.spec-type-intent { background: rgba(108,138,255,0.2); color: var(--accent); }
.spec-type-decision { background: rgba(251,191,36,0.2); color: var(--yellow); }
.spec-type-constraint { background: rgba(248,113,113,0.2); color: var(--red); }
.spec-type-contract { background: rgba(167,139,250,0.2); color: var(--purple); }
.spec-type-convention { background: rgba(74,222,128,0.2); color: var(--green); }
.spec-type-context { background: rgba(34,211,238,0.2); color: var(--cyan); }
.spec-type-change { background: rgba(251,146,60,0.2); color: var(--orange); }
.spec-id { font-size: 11px; color: var(--text-dim); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.spec-confidence { font-size: 11px; color: var(--text-dim); flex-shrink: 0; }
.spec-summary { margin-top: 8px; font-size: 12px; line-height: 1.6; }
.spec-detail { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
.spec-detail-section { margin-top: 8px; }
.spec-detail-section h4 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 4px; }
.anchor-list { list-style: none; }
.anchor-list li { font-size: 11px; color: var(--accent); padding: 2px 0; }
.relation-list { list-style: none; }
.relation-list li { font-size: 11px; color: var(--purple); padding: 2px 0; cursor: pointer; }
.relation-list li:hover { text-decoration: underline; }

/* ── Filters ── */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-chip { padding: 4px 12px; border-radius: 14px; font-size: 11px; font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-dim); transition: all 0.15s; }
.filter-chip:hover { border-color: var(--text-dim); color: var(--text); }
.filter-chip.active { border-color: var(--accent); background: rgba(108,138,255,0.1); color: var(--accent); }
.search-input { flex: 1; min-width: 200px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--font); font-size: 12px; outline: none; }
.search-input:focus { border-color: var(--accent); }
.result-count { font-size: 11px; color: var(--text-dim); padding: 4px 0; }

/* ── Coverage ── */
.coverage-overview { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.coverage-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
.coverage-card .big-number { font-size: 36px; font-weight: 700; }
.coverage-card .label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 4px; }
.coverage-bar-container { height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; margin-top: 12px; }
.coverage-bar { height: 100%; border-radius: 4px; transition: width 0.5s ease; }

.heatmap-container { display: flex; flex-direction: column; gap: 4px; }
.heatmap-row { display: flex; align-items: center; gap: 8px; padding: 3px 0; }
.heatmap-feature { width: 200px; font-size: 11px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.heatmap-bar-bg { flex: 1; height: 20px; background: var(--surface2); border-radius: 4px; overflow: hidden; position: relative; }
.heatmap-bar-fill { height: 100%; border-radius: 4px; transition: width 0.5s ease; display: flex; align-items: center; justify-content: flex-end; padding-right: 6px; font-size: 10px; font-weight: 600; min-width: 30px; }
.heatmap-files { font-size: 10px; color: var(--text-dim); width: 80px; text-align: right; flex-shrink: 0; }

/* ── Loading / Empty ── */
.loading-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; }
.loading-screen h1 { font-size: 24px; font-weight: 700; color: var(--accent); }
.loading-screen p { color: var(--text-dim); font-size: 13px; max-width: 400px; text-align: center; line-height: 1.8; }
.load-btn { padding: 10px 24px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; }
.load-btn:hover { opacity: 0.85; }
.load-methods { display: flex; gap: 12px; align-items: center; margin-top: 8px; }
.load-methods span { color: var(--text-dim); font-size: 11px; }
.error-msg { color: var(--red); font-size: 12px; margin-top: 8px; }
.drag-overlay { position: fixed; inset: 0; background: rgba(108,138,255,0.08); border: 3px dashed var(--accent); z-index: 1000; display: none; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: var(--accent); }
.drag-overlay.visible { display: flex; }

/* ── Focus ── */
:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
:focus:not(:focus-visible) { outline: none; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* ── Feature Detail Panel ── */
.feature-detail { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 20px; }
.feature-detail h2 { font-size: 16px; margin-bottom: 4px; }
.feature-detail .meta-row { display: flex; gap: 12px; font-size: 11px; color: var(--text-dim); margin-bottom: 12px; }
.key-files { list-style: none; max-height: 150px; overflow-y: auto; }
.key-files li { font-size: 11px; color: var(--accent); padding: 2px 0; font-family: var(--font); }

/* ── Responsive ── */
@media (max-width: 800px) {
  .sidebar { display: none; }
  :root { --sidebar-w: 0px; }
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen" class="loading-screen">
  <h1>ShadowRepo</h1>
  <p>Semantic knowledge graph for your codebase. Load <code>.shadowrepo/</code> data to explore features, specs, and coverage.</p>
  <div class="load-methods">
    <button class="load-btn" onclick="pickFolder()">Open .shadowrepo/ folder</button>
    <span>or drag &amp; drop JSON files</span>
  </div>
  <div id="auto-load-msg" style="color: var(--text-dim); font-size: 11px; margin-top: 12px;"></div>
  <div id="load-error" class="error-msg"></div>
</div>

<!-- Drag overlay -->
<div id="drag-overlay" class="drag-overlay">Drop .shadowrepo/ JSON files here</div>

<!-- Main App (hidden until data loaded) -->
<div id="app" class="app" style="display:none;">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Feature Tree</h2>
      <input class="sidebar-search" id="tree-search" placeholder="Filter features..." oninput="filterTree(this.value)">
    </div>
    <div class="tree-container" id="tree-container"></div>
  </aside>

  <!-- Main -->
  <div class="main">
    <!-- Top bar -->
    <header class="topbar">
      <h1 class="logo">ShadowRepo</h1>
      <span id="repo-name" style="color:var(--text-dim); font-size: 12px;"></span>
      <div class="stats" id="topbar-stats"></div>
    </header>

    <!-- Tabs -->
    <nav class="tab-bar" role="tablist">
      <button class="tab active" data-tab="specs" role="tab" aria-selected="true" onclick="switchTab('specs')">Specs</button>
      <button class="tab" data-tab="coverage" role="tab" aria-selected="false" onclick="switchTab('coverage')">Coverage</button>
    </nav>

    <!-- Content -->
    <div class="content">
      <!-- Feature Detail (shown when a feature is selected) -->
      <div id="feature-detail" class="feature-detail" style="display:none;"></div>

      <!-- Specs Panel -->
      <div id="panel-specs" class="tab-panel active">
        <div class="filter-bar">
          <input class="search-input" id="spec-search" placeholder="Search specs..." oninput="renderSpecs()">
          <div id="type-filters"></div>
        </div>
        <div class="result-count" id="spec-count"></div>
        <div class="spec-grid" id="spec-grid"></div>
      </div>

      <!-- Coverage Panel -->
      <div id="panel-coverage" class="tab-panel">
        <div class="coverage-overview" id="coverage-overview"></div>
        <h3 style="margin-bottom: 12px; font-size: 13px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px;">Coverage by Feature</h3>
        <div class="heatmap-container" id="heatmap"></div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
let data = { meta: null, features: [], specs: [], coverage: null };
let selectedFeature = null;
let activeTypeFilters = new Set();
let expandedSpecs = new Set();
const SPEC_TYPES = ['intent','decision','constraint','contract','convention','context','change'];

// ── Data Loading ──

// Try auto-loading from relative path (when served via HTTP)
(async function autoLoad() {
  const msg = document.getElementById('auto-load-msg');
  try {
    msg.textContent = 'Attempting to load from .shadowrepo/ ...';
    const [meta, features, specs, coverage] = await Promise.all([
      fetch('../.shadowrepo/meta.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch('../.shadowrepo/features.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch('../.shadowrepo/specs.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      fetch('../.shadowrepo/coverage.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
    ]);
    data = { meta, features, specs, coverage };
    boot();
  } catch {
    // Also try .shadowrepo/ at same level
    try {
      const [meta, features, specs, coverage] = await Promise.all([
        fetch('.shadowrepo/meta.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('.shadowrepo/features.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('.shadowrepo/specs.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
        fetch('.shadowrepo/coverage.json').then(r => { if (!r.ok) throw new Error(); return r.json(); }),
      ]);
      data = { meta, features, specs, coverage };
      boot();
    } catch {
      msg.textContent = 'Auto-load failed. Use the button or drag & drop to load data.';
    }
  }
})();

// File picker (folder)
async function pickFolder() {
  try {
    if (window.showDirectoryPicker) {
      const dir = await window.showDirectoryPicker();
      const files = {};
      for await (const [name, handle] of dir) {
        if (handle.kind === 'file' && name.endsWith('.json')) {
          const file = await handle.getFile();
          const text = await file.text();
          files[name] = JSON.parse(text);
        }
      }
      loadFromFiles(files);
    } else {
      // Fallback: file input
      const input = document.createElement('input');
      input.type = 'file';
      input.multiple = true;
      input.accept = '.json';
      input.onchange = async () => {
        const files = {};
        for (const f of input.files) {
          const text = await f.text();
          files[f.name] = JSON.parse(text);
        }
        loadFromFiles(files);
      };
      input.click();
    }
  } catch (e) {
    document.getElementById('load-error').textContent = 'Failed to load: ' + e.message;
  }
}

function loadFromFiles(files) {
  const err = document.getElementById('load-error');
  if (!files['meta.json'] || !files['features.json'] || !files['specs.json']) {
    err.textContent = 'Missing required files. Need: meta.json, features.json, specs.json';
    return;
  }
  data.meta = files['meta.json'];
  data.features = files['features.json'];
  data.specs = files['specs.json'];
  data.coverage = files['coverage.json'] || null;
  boot();
}

// Drag & drop
document.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drag-overlay').classList.add('visible'); });
document.addEventListener('dragleave', e => { if (e.relatedTarget === null) document.getElementById('drag-overlay').classList.remove('visible'); });
document.addEventListener('drop', async e => {
  e.preventDefault();
  document.getElementById('drag-overlay').classList.remove('visible');
  const files = {};
  for (const item of e.dataTransfer.files) {
    if (item.name.endsWith('.json')) {
      const text = await item.text();
      files[item.name] = JSON.parse(text);
    }
  }
  loadFromFiles(files);
});

// ── Boot ──
function boot() {
  document.getElementById('loading-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  renderTopbar();
  renderTree();
  renderTypeFilters();
  renderSpecs();
  renderCoverage();
}

// ── Topbar ──
function renderTopbar() {
  const m = data.meta;
  if (!m) return;
  document.getElementById('repo-name').textContent = m.repo_name || '';
  const stats = document.getElementById('topbar-stats');
  const status = (m.build_status || 'unknown').toLowerCase();
  stats.innerHTML = `
    <span class="build-badge ${status}">${m.build_status || '?'}</span>
    <div class="stat"><span class="stat-value">${m.stats?.total_features || data.features.length}</span><span class="stat-label">features</span></div>
    <div class="stat"><span class="stat-value">${m.stats?.total_specs || data.specs.length}</span><span class="stat-label">specs</span></div>
    <div class="stat"><span class="stat-value">${m.stats?.coverage_percent != null ? m.stats.coverage_percent + '%' : '—'}</span><span class="stat-label">coverage</span></div>
    <div class="stat" style="color:var(--text-dim); font-size:11px;">${formatDate(m.built_at)}</div>
  `;
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// ── Feature Tree ──
function buildTree(features) {
  const map = new Map();
  const roots = [];
  features.forEach(f => map.set(f.feature_id, { ...f, children: [] }));
  features.forEach(f => {
    const node = map.get(f.feature_id);
    if (f.parent && map.has(f.parent)) {
      map.get(f.parent).children.push(node);
    } else {
      roots.push(node);
    }
  });
  return roots;
}

function renderTree(filter = '') {
  const container = document.getElementById('tree-container');
  const roots = buildTree(data.features);
  const lf = filter.toLowerCase();
  container.innerHTML = renderTreeNodes(roots, lf);
}

function renderTreeNodes(nodes, filter) {
  return nodes
    .filter(n => !filter || matchFeature(n, filter))
    .sort((a, b) => a.name.localeCompare(b.name))
    .map(n => {
      const specCount = data.specs.filter(s => s.feature_name === n.feature_id).length;
      const hasChildren = n.children.length > 0;
      const isSelected = selectedFeature === n.feature_id;
      const icon = n.type === 'business' ? '&#9632;' : n.type === 'platform' ? '&#9670;' : '&#9679;';
      const typeColor = n.type === 'business' ? 'var(--accent)' : n.type === 'platform' ? 'var(--purple)' : 'var(--cyan)';
      return `<div class="tree-node" data-id="${n.feature_id}">
        <div class="tree-label${isSelected ? ' selected' : ''}" onclick="selectFeature('${n.feature_id}')">
          <span class="tree-toggle ${hasChildren ? '' : 'leaf'}${hasChildren ? '' : ''}" onclick="event.stopPropagation(); toggleTreeNode(this)">${hasChildren ? '&#9654;' : ''}</span>
          <span class="tree-icon" style="color:${typeColor}">${icon}</span>
          <span class="tree-name">${n.name}</span>
          <span class="tree-count">${specCount}</span>
        </div>
        ${hasChildren ? `<div class="tree-children collapsed">${renderTreeNodes(n.children, filter)}</div>` : ''}
      </div>`;
    }).join('');
}

function matchFeature(node, filter) {
  if (node.name.toLowerCase().includes(filter) || node.feature_id.toLowerCase().includes(filter)) return true;
  return node.children.some(c => matchFeature(c, filter));
}

function toggleTreeNode(el) {
  const children = el.closest('.tree-node').querySelector('.tree-children');
  if (!children) return;
  const isCollapsed = children.classList.contains('collapsed');
  children.classList.toggle('collapsed');
  el.classList.toggle('open', isCollapsed);
}

function filterTree(value) { renderTree(value); }

function selectFeature(id) {
  selectedFeature = selectedFeature === id ? null : id;
  renderTree(document.getElementById('tree-search').value);
  renderFeatureDetail();
  renderSpecs();
}

// ── Feature Detail ──
function renderFeatureDetail() {
  const el = document.getElementById('feature-detail');
  if (!selectedFeature) { el.style.display = 'none'; return; }
  const f = data.features.find(f => f.feature_id === selectedFeature);
  if (!f) { el.style.display = 'none'; return; }
  const specCount = data.specs.filter(s => s.feature_name === f.feature_id).length;
  const fileCount = (f.key_files || []).length;
  el.style.display = 'block';
  el.innerHTML = `
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <h2>${f.name}</h2>
      <span class="type-badge type-${f.type}">${f.type}</span>
    </div>
    <div class="meta-row">
      <span>${specCount} specs</span>
      <span>${fileCount} key files</span>
      ${f.parent ? `<span>parent: ${f.parent}</span>` : ''}
    </div>
    ${f.description ? `<p style="font-size:12px; color:var(--text-dim); margin-bottom:12px;">${esc(f.description)}</p>` : ''}
    ${fileCount > 0 ? `
      <h4 style="font-size:11px; text-transform:uppercase; letter-spacing:0.5px; color:var(--text-dim); margin-bottom:4px;">Key Files</h4>
      <ul class="key-files">${f.key_files.slice(0, 20).map(p => `<li>${esc(p)}</li>`).join('')}${fileCount > 20 ? `<li style="color:var(--text-dim)">... and ${fileCount - 20} more</li>` : ''}</ul>
    ` : ''}
  `;
}

// ── Type Filters ──
function renderTypeFilters() {
  const container = document.getElementById('type-filters');
  // Count specs per type
  const counts = {};
  SPEC_TYPES.forEach(t => counts[t] = 0);
  data.specs.forEach(s => { if (counts[s.type] !== undefined) counts[s.type]++; });
  container.innerHTML = SPEC_TYPES
    .filter(t => counts[t] > 0)
    .map(t => `<span class="filter-chip${activeTypeFilters.has(t) ? ' active' : ''}" data-type="${t}" onclick="toggleTypeFilter('${t}')">${t} (${counts[t]})</span>`)
    .join('');
}

function toggleTypeFilter(type) {
  if (activeTypeFilters.has(type)) activeTypeFilters.delete(type);
  else activeTypeFilters.add(type);
  renderTypeFilters();
  renderSpecs();
}

// ── Spec Browser ──
function renderSpecs() {
  const query = document.getElementById('spec-search').value.toLowerCase();
  let filtered = data.specs;

  // Filter by selected feature
  if (selectedFeature) {
    filtered = filtered.filter(s => s.feature_name === selectedFeature);
  }

  // Filter by type
  if (activeTypeFilters.size > 0) {
    filtered = filtered.filter(s => activeTypeFilters.has(s.type));
  }

  // Filter by search
  if (query) {
    filtered = filtered.filter(s =>
      s.spec_id.toLowerCase().includes(query) ||
      s.summary.toLowerCase().includes(query) ||
      (s.detail || '').toLowerCase().includes(query) ||
      s.feature_name.toLowerCase().includes(query)
    );
  }

  // Sort by confidence desc, then by type
  filtered.sort((a, b) => (b.confidence || 0) - (a.confidence || 0));

  const countEl = document.getElementById('spec-count');
  countEl.textContent = `${filtered.length} spec${filtered.length !== 1 ? 's' : ''}${selectedFeature ? ` in ${selectedFeature}` : ''}`;

  const grid = document.getElementById('spec-grid');
  // Virtualize: only render first 100, add "show more" button
  const limit = 100;
  const showing = filtered.slice(0, limit);
  grid.innerHTML = showing.map(s => renderSpecCard(s)).join('') +
    (filtered.length > limit ? `<div style="text-align:center; padding:16px;"><button class="load-btn" onclick="this.parentElement.remove(); renderAllSpecs()">Show all ${filtered.length} specs</button></div>` : '');
}

function renderSpecCard(s) {
  const isExpanded = expandedSpecs.has(s.spec_id);
  const conf = s.confidence != null ? Math.round(s.confidence * 100) + '%' : '';
  const anchors = s.anchors || [];
  const relations = s.relations || [];

  return `<div class="spec-card${isExpanded ? ' expanded' : ''}" onclick="toggleSpec('${esc(s.spec_id)}')">
    <div class="spec-header">
      <span class="spec-type spec-type-${s.type}">${s.type}</span>
      <span class="spec-id" title="${esc(s.spec_id)}">${esc(s.spec_id)}</span>
      ${conf ? `<span class="spec-confidence">${conf}</span>` : ''}
    </div>
    <div class="spec-summary">${esc(s.summary)}</div>
    ${isExpanded ? `<div class="spec-detail">
      ${s.detail ? `<div class="spec-detail-section"><h4>Detail</h4><p style="font-size:12px; line-height:1.7;">${esc(s.detail)}</p></div>` : ''}
      ${anchors.length ? `<div class="spec-detail-section"><h4>Anchors (${anchors.length})</h4><ul class="anchor-list">${anchors.map(a => `<li>${esc(typeof a === 'string' ? a : a.file)}${a.symbols ? ' — ' + a.symbols.join(', ') : ''}</li>`).join('')}</ul></div>` : ''}
      ${relations.length ? `<div class="spec-detail-section"><h4>Relations (${relations.length})</h4><ul class="relation-list">${relations.map(r => `<li>${esc(typeof r === 'string' ? r : (r.type + ' → ' + r.target_spec_id))}</li>`).join('')}</ul></div>` : ''}
      <div class="spec-detail-section" style="display:flex; gap:16px;">
        <span style="font-size:10px; color:var(--text-dim);">feature: ${esc(s.feature_name)}</span>
        <span style="font-size:10px; color:var(--text-dim);">provenance: ${s.provenance || '?'}</span>
        <span style="font-size:10px; color:var(--text-dim);">state: ${s.state || '?'}</span>
      </div>
    </div>` : ''}
  </div>`;
}

function toggleSpec(id) {
  if (expandedSpecs.has(id)) expandedSpecs.delete(id);
  else expandedSpecs.add(id);
  renderSpecs();
}

// ── Coverage ──
function renderCoverage() {
  const overview = document.getElementById('coverage-overview');
  const heatmap = document.getElementById('heatmap');
  const cov = data.coverage;
  const m = data.meta;

  const totalFiles = m?.stats?.total_files || (cov ? (cov.covered_files?.length || 0) + (cov.uncovered_files?.length || 0) : 0);
  const coveredCount = cov?.covered_files?.length || m?.stats?.files_with_specs || 0;
  const pct = cov?.coverage_percent ?? m?.stats?.coverage_percent ?? (totalFiles ? Math.round(coveredCount / totalFiles * 100) : 0);
  const pctColor = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';

  overview.innerHTML = `
    <div class="coverage-card">
      <div class="big-number" style="color:${pctColor}">${pct}%</div>
      <div class="label">File Coverage</div>
      <div class="coverage-bar-container"><div class="coverage-bar" style="width:${pct}%; background:${pctColor};"></div></div>
    </div>
    <div class="coverage-card">
      <div class="big-number">${coveredCount}</div>
      <div class="label">Covered Files</div>
    </div>
    <div class="coverage-card">
      <div class="big-number">${totalFiles - coveredCount}</div>
      <div class="label">Uncovered Files</div>
    </div>
    <div class="coverage-card">
      <div class="big-number">${data.specs.length}</div>
      <div class="label">Total Specs</div>
    </div>
  `;

  // Heatmap: coverage per feature
  const featureStats = data.features.map(f => {
    const featureSpecs = data.specs.filter(s => s.feature_name === f.feature_id);
    const featureFiles = new Set();
    featureSpecs.forEach(s => (s.anchors || []).forEach(a => {
      const file = typeof a === 'string' ? a : a.file;
      if (file) featureFiles.add(file);
    }));
    return { id: f.feature_id, name: f.name, type: f.type, specs: featureSpecs.length, files: featureFiles.size, keyFiles: (f.key_files || []).length };
  }).filter(f => f.specs > 0).sort((a, b) => b.specs - a.specs);

  const maxSpecs = Math.max(...featureStats.map(f => f.specs), 1);

  heatmap.innerHTML = featureStats.map(f => {
    const pct = Math.round(f.specs / maxSpecs * 100);
    const typeColor = f.type === 'business' ? 'var(--accent)' : f.type === 'platform' ? 'var(--purple)' : 'var(--cyan)';
    return `<div class="heatmap-row">
      <span class="heatmap-feature" title="${esc(f.id)}" style="cursor:pointer;" onclick="selectFeature('${f.id}'); switchTab('specs');">${esc(f.name)}</span>
      <div class="heatmap-bar-bg"><div class="heatmap-bar-fill" style="width:${pct}%; background:${typeColor};">${f.specs}</div></div>
      <span class="heatmap-files">${f.files} files</span>
    </div>`;
  }).join('');
}

// ── Tabs ──
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => {
    const isActive = t.dataset.tab === tab;
    t.classList.toggle('active', isActive);
    t.setAttribute('aria-selected', isActive);
  });
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === 'panel-' + tab));
}

// ── Helpers ──
function esc(str) {
  if (!str) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}
</script>
</body>
</html>
